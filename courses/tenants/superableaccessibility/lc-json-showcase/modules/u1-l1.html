<section class="lc-module-container" id="module-u1-l1">
  <h1 class="module-title">Lesson 1: ARIA Basics</h1>
  <p class="module-summary">Introduction to ARIA patterns.</p>
  <div class="module-body-text">
    Learn how ARIA attributes enhance accessibility.
  </div>
  <fieldset class="lc-question-card lc-qtype-multipleChoice" data-global-id="q-mc-1" data-points="1" data-difficulty="5">
    <legend class="lc-question-legend" style="display: block;">
      <span class="lc-question-title">Multiple Choice Test</span>
      <span class="lc-points-badge">(1 point)</span>
      <span id="prompt_qmc1" class="lc-question-prompt" style="display: block; font-weight: normal; margin-top: 0.5rem;">Which attribute indicates accordion state?</span>
    </legend>
    <div class="lc-options-group">
      <div class="lc-option-item">
        <input type="radio" id="lc_input_qmc1_0" name="lc_input_qmc1" value="aria-expanded" data-pts="1" class="lc-option-input" aria-describedby="prompt_qmc1">
        <label for="lc_input_qmc1_0" class="lc-option-label">aria-expanded</label>
      </div>
      <div class="lc-option-item">
        <input type="radio" id="lc_input_qmc1_1" name="lc_input_qmc1" value="aria-hidden" data-pts="0" class="lc-option-input" aria-describedby="prompt_qmc1">
        <label for="lc_input_qmc1_1" class="lc-option-label">aria-hidden</label>
      </div>
      <div class="lc-option-item">
        <input type="radio" id="lc_input_qmc1_2" name="lc_input_qmc1" value="aria-live" data-pts="0" class="lc-option-input" aria-describedby="prompt_qmc1">
        <label for="lc_input_qmc1_2" class="lc-option-label">aria-live</label>
      </div>
    </div>
    <button type="button" class="lc-btn-submit" data-xapi-verb="ANSWERED" data-xapi-name="LC-JSON Question q-mc-1">Check Answer</button>
    <div class="lc-feedback-region" role="status" aria-live="polite"></div>
  </fieldset>
  <fieldset class="lc-question-card lc-qtype-trueFalseQuestion" data-global-id="q-tf-1" data-points="1" data-difficulty="5">
    <legend class="lc-question-legend" style="display: block;">
      <span class="lc-question-title">True/False Test</span>
      <span class="lc-points-badge">(1 point)</span>
      <span id="prompt_qtf1" class="lc-question-prompt" style="display: block; font-weight: normal; margin-top: 0.5rem;">Native &lt;button&gt; elements handle Space and Enter keys automatically.</span>
    </legend>
    <div class="lc-options-group lc-tf-group">
      <div class="lc-option-item">
        <input type="radio" id="lc_input_qtf1_t" name="lc_input_qtf1" value="true" data-correct="true" class="lc-option-input" aria-describedby="prompt_qtf1">
        <label for="lc_input_qtf1_t" class="lc-option-label">True</label>
      </div>
      <div class="lc-option-item">
        <input type="radio" id="lc_input_qtf1_f" name="lc_input_qtf1" value="false" data-correct="true" class="lc-option-input" aria-describedby="prompt_qtf1">
        <label for="lc_input_qtf1_f" class="lc-option-label">False</label>
      </div>
    </div>
    <button type="button" class="lc-btn-submit" data-xapi-verb="ANSWERED" data-xapi-name="True/False Question">Check Answer</button>
    <div class="lc-feedback-region" role="status" aria-live="polite"></div>
  </fieldset>
</section>
